<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - React</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        .volver { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; }
        form { background: #f1f1f1; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { display: block; margin-bottom: 10px; width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .btn-eliminar { background-color: #dc3545; padding: 6px 10px; }
        .btn-eliminar:hover { background-color: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <a href="index.html" class="volver">Volver al Inicio</a>
    <h1>Ejercicio 3: Formulario y Tabla (React)</h1>

    <div id="root"></div>

    <script>
        const { createElement: h, useState } = React;

        function App() {
            const [personas, setPersonas] = useState([]);
            const [form, setForm] = useState({
                nombre: "",
                apellido: "",
                edad: "",
                altura: "",
                peso: ""
            });

            function handleChange(evento) {
                setForm({
                    ...form,
                    [evento.target.name]: evento.target.value
                });
            }

            function calcularIMC(peso, altura) {
                const pesoNumero = parseFloat(peso);
                const alturaNumero = parseFloat(altura);

                if (pesoNumero > 0 && alturaNumero > 0) {
                    return (pesoNumero / (alturaNumero * alturaNumero)).toFixed(2);
                }

                return "0";
            }

            function handleSubmit(evento) {
                evento.preventDefault();

                const nuevaPersona = {
                    id: Date.now(),
                    ...form,
                    imc: calcularIMC(form.peso, form.altura)
                };

                setPersonas([...personas, nuevaPersona]);
                setForm({
                    nombre: "",
                    apellido: "",
                    edad: "",
                    altura: "",
                    peso: ""
                });
            }

            function eliminarPersona(id) {
                setPersonas(personas.filter((persona) => persona.id !== id));
            }

            return h(
                "div",
                null,
                h(
                    "form",
                    { onSubmit: handleSubmit },
                    h("input", { type: "text", name: "nombre", value: form.nombre, onChange: handleChange, placeholder: "Ej: Juan", required: true }),
                    h("input", { type: "text", name: "apellido", value: form.apellido, onChange: handleChange, placeholder: "Ej: Perez", required: true }),
                    h("input", { type: "number", name: "edad", value: form.edad, onChange: handleChange, placeholder: "Edad", min: "1", required: true }),
                     h("input", { type: "number", name: "altura", value: form.altura, onChange: handleChange, placeholder: "Altura en metros (Ej: 1.75)", step: "0.01", min: "0.1", required: true }),
                    h("input", { type: "number", name: "peso", value: form.peso, onChange: handleChange, placeholder: "Peso en kg (Ej: 75.5)", step: "0.1", min: "1", required: true }),
                    h("button", { type: "submit" }, "Agregar Persona")
                ),
                h("h2", null, "Listado de Registros Actuales"),
                h(
                    "table",
                    null,
                    h(
                        "thead",
                        null,
                        h(
                            "tr",
                            null,
                            h("th", null, "Nombre"),
                            h("th", null, "Apellido"),
                            h("th", null, "Edad"),
                            h("th", null, "Altura (m)"),
                            h("th", null, "Peso (kg)"),
                            h("th", null, "IMC"),
                            h("th", null, "Accion")
                        )
                    ),
                    h(
                        "tbody",
                        null,
                        personas.map((persona) =>
                            h(
                                "tr",
                                { key: persona.id },
                                h("td", null, persona.nombre),
                                h("td", null, persona.apellido),
                                h("td", null, persona.edad),
                                h("td", null, persona.altura),
                                h("td", null, persona.peso),
                                h("td", null, h("strong", null, persona.imc)),
                                h(
                                    "td",
                                    null,
                                    h(
                                        "button",
                                        { type: "button", className: "btn-eliminar", onClick: () => eliminarPersona(persona.id) },
                                        "Eliminar"
                                    )
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(h(App));
    </script>
</body>
</html>
